<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Find Contacts Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Find Contacts Options</h1>
      <label for="apiBaseUrl">Server API base URL</label>
      <input id="apiBaseUrl" type="url" placeholder="https://contacts.gaid.studio">
      <label for="webBaseUrl">Account website URL</label>
      <input id="webBaseUrl" type="url" placeholder="http://localhost:3000">
      <label for="apiToken">Extension API token</label>
      <textarea id="apiToken" spellcheck="false" placeholder="Paste the token generated from Dashboard > Extension"></textarea>
      <div class="actions">
        <button id="save" type="button">Save</button>
        <button id="connect" type="button" class="secondary">Open account</button>
        <button id="clearToken" type="button" class="secondary">Sign out</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
