<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reachard Extension</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Reachard</h1>
      <section class="status-card">
        <div>
          <p class="eyebrow" data-i18n="account">Account</p>
          <h2 id="connectionState"></h2>
        </div>
        <p id="accountDetails"></p>
      </section>

      <div class="grid">
        <div>
          <label for="webBaseUrl" data-i18n="websiteUrl">Website URL</label>
          <input id="webBaseUrl" type="url" placeholder="https://reachard.co">
        </div>
        <div>
          <label for="apiBaseUrl" data-i18n="apiUrl">API URL</label>
          <input id="apiBaseUrl" type="url" placeholder="https://contacts.reachard.co">
        </div>
      </div>

      <div class="actions">
        <button id="connect" type="button" data-i18n="signIn">Sign in</button>
        <button id="pricing" type="button" class="secondary" data-i18n="upgrade">Upgrade</button>
        <button id="refresh" type="button" class="secondary" data-i18n="refreshStatus">Refresh status</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
