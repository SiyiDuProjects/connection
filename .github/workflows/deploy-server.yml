name: Deploy contacts server

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-contacts-server
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: |
          find src -name '*.js' -print0 | xargs -0 -n1 node --check

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host deploy-server
            HostName $SSH_HOST
            Port ${SSH_PORT:-22}
            User $SSH_USER
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Sync server files
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_PATH"
          ssh deploy-server "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'node_modules' \
            server/ deploy-server:"$DEPLOY_PATH"/

      - name: Rebuild container
        env:
          COMPOSE_PATH: ${{ secrets.COMPOSE_PATH }}
        run: |
          test -n "$COMPOSE_PATH"
          ssh deploy-server "COMPOSE_PATH='$COMPOSE_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$COMPOSE_PATH"
          sudo docker compose build connection_contacts
          if ! sudo docker compose up -d --no-build --force-recreate --remove-orphans connection_contacts; then
            sudo docker compose rm -fs connection_contacts || true
            sudo docker rm -f connection_contacts 2>/dev/null || true
            sudo docker compose up -d --no-build --force-recreate --remove-orphans connection_contacts
          fi
          sudo docker logs --tail=80 connection_contacts
          REMOTE

      - name: Health check
        run: |
          PUBLIC_HEALTH_URL="https://contacts.reachard.co/health"
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error "$PUBLIC_HEALTH_URL"; then
              exit 0
            fi
            echo "Health check failed; retrying in 5 seconds ($attempt/24)."
            sleep 5
          done
          curl --fail --silent --show-error "$PUBLIC_HEALTH_URL"
